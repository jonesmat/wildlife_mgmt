# Publishes the web app to Cloudflare Pages when a GitHub release is created.
#
# One-time setup:
#   1. Create a Cloudflare account (free) and a Pages project:
#        npx wrangler pages project create wildlife-mgmt
#      (or create it in the Cloudflare dashboard under Workers & Pages)
#   2. In this repo's Settings -> Secrets and variables -> Actions, add:
#        CLOUDFLARE_API_TOKEN  - API token with the "Cloudflare Pages: Edit" permission
#        CLOUDFLARE_ACCOUNT_ID - shown on the Cloudflare dashboard sidebar
#
# The app is fully static (all data lives in the browser via IndexedDB and a
# service worker), so deploying public/ is the entire site. public/_redirects
# replicates server.js's pretty routes (/log, /report/2026, ...).

name: Deploy to Cloudflare Pages

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Deploy public/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=wildlife-mgmt --branch=main

      - name: Deployment summary
        run: |
          echo "### Deployed ${{ github.event.release.tag_name }} to Cloudflare Pages :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Site: https://wildlife-mgmt.pages.dev" >> "$GITHUB_STEP_SUMMARY"
