<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Census Trends</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="/theme.js"></script>
<script src="/store.js"></script>
<link rel="stylesheet" href="/form-shared.css">
<style>
.trend-card {
  background: white; border: 1px solid #ddd; border-radius: 10px;
  padding: 16px 18px; margin-bottom: 16px;
}
.trend-title { font-size: 1.05rem; font-weight: 700; color: #1a4a1a; }
.trend-sub { font-size: 0.8rem; color: #777; margin: 2px 0 10px; }
.trend-chart { width: 100%; height: auto; display: block; }
.trend-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.trend-stat {
  font-size: 0.78rem; padding: 4px 12px; border-radius: 12px;
  background: #f0f4ee; color: #1a4a1a; font-weight: 600;
}
.trend-stat.up   { background: #e8f0e8; }
.trend-stat.down { background: #fdf0e8; color: #8b5a1a; }
.trend-empty { color: #999; font-style: italic; text-align: center; padding: 40px 20px; }
</style>
<script src="/google-sync.js"></script>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<header>
  <h1>📈 Census Trends</h1>
  <div class="header-actions">
    <a href="/activity" class="btn btn-white">Activity Log</a>
    <a href="/" class="btn btn-white">Home</a>
  </div>
</header>

<div class="layout">
  <main class="main" style="max-width:860px">
    <div class="hint-block" style="margin-bottom:16px">
      Population trends from your census entries, grouped by route. Counts are read from the
      "Total Observed" field (the leading number). Running the same route under the same
      conditions each season is what makes these lines meaningful.
    </div>
    <div class="trend-card" id="moonCard" style="display:none"></div>
    <div class="trend-card" id="rainCard" style="display:none"></div>
    <div class="trend-card" id="spendCard" style="display:none"></div>

    <div id="trendsBody">
      <div style="color:#999;font-size:0.9rem">Loading...</div>
    </div>
  </main>
</div>

<script>
var entries = [], routes = [], rainHistory = null;

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function routeNameById(id) {
  for (var i = 0; i < routes.length; i++) if (routes[i].id === id) return routes[i].name;
  return null;
}

// Same survey-type icons as the Activity Log timeline
var CENSUS_ICONS = {
  'Spotlight Count': '🔦', 'Stand Count': '🪜', 'Aerial Count': '🚁', 'Track Count': '🐾',
  'Browse Utilization': '🌿', 'Incidental Observation': '👁️', 'Camera Survey': '📷', 'Harvest Data': '🎯'
};

// Leading number from "Total Observed" free text, e.g. "12 deer (8M/4F)" -> 12
function parseCount(s) {
  var m = String(s || '').match(/(\d+(\.\d+)?)/);
  return m ? parseFloat(m[1]) : null;
}

function dateFrac(s) {
  var d = new Date(s);
  return d.getFullYear() + (d.getMonth() / 12);
}

// ── Moon phase activity / best hunting time ──
var MOON_PHASES = [
  { icon: '🌑', name: 'New Moon' },
  { icon: '🌒', name: 'Waxing Crescent' },
  { icon: '🌓', name: 'First Quarter' },
  { icon: '🌔', name: 'Waxing Gibbous' },
  { icon: '🌕', name: 'Full Moon' },
  { icon: '🌖', name: 'Waning Gibbous' },
  { icon: '🌗', name: 'Last Quarter' },
  { icon: '🌘', name: 'Waning Crescent' }
];

function moonPhaseIndex(date) {
  var synodic = 29.53058867;
  var days = (date.getTime() - Date.UTC(2000, 0, 6, 18, 14)) / 86400000;
  var frac = (((days % synodic) + synodic) % synodic) / synodic;
  return Math.round(frac * 8) % 8;
}

// First upcoming date (within one cycle) whose phase matches
function nextPhaseDate(idx) {
  var d = new Date();
  for (var i = 0; i < 31; i++) {
    if (moonPhaseIndex(d) === idx) return d;
    d = new Date(d.getTime() + 86400000);
  }
  return null;
}

function renderMoonCard() {
  // Wildlife activity per phase: harvests count 1, sightings count the
  // animals seen. Stored phase preferred, else computed from the date.
  var counts = [0, 0, 0, 0, 0, 0, 0, 0];
  var total = 0;
  entries.forEach(function(e) {
    if (e.type !== 'Harvest' && e.type !== 'Sighting') return;
    if (!e.datetime && typeof e.moon !== 'number') return;
    var idx = (typeof e.moon === 'number') ? e.moon : moonPhaseIndex(new Date(e.datetime));
    var weight = (e.type === 'Sighting') ? (parseInt(e['si-count'], 10) || 1) : 1;
    counts[idx] += weight;
    total += weight;
  });
  if (!total) return;

  var best = 0;
  counts.forEach(function(c, i) { if (c > counts[best]) best = i; });
  var max = counts[best];
  var todayIdx = moonPhaseIndex(new Date());
  var next = nextPhaseDate(best);
  var nextStr = next ? next.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';

  var bars = MOON_PHASES.map(function(p, i) {
    var h = max ? Math.max(3, Math.round(counts[i] / max * 80)) : 3;
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px" title="' + p.name + ': ' + counts[i] + '">' +
      '<span style="font-size:0.72rem;color:#777">' + (counts[i] || '') + '</span>' +
      '<div style="width:70%;max-width:34px;height:' + h + 'px;border-radius:4px 4px 0 0;background:' + (i === best ? '#1a4a1a' : '#c9d6c2') + '"></div>' +
      '<span style="font-size:1.15rem' + (i === best ? ';filter:drop-shadow(0 0 3px rgba(26,74,26,0.5))' : '') + '">' + p.icon + '</span>' +
      (i === todayIdx ? '<span style="font-size:0.62rem;font-weight:700;color:#1a398b">TODAY</span>' : '<span style="font-size:0.62rem">&nbsp;</span>') +
    '</div>';
  }).join('');

  var card = document.getElementById('moonCard');
  card.style.display = '';
  card.innerHTML =
    '<div class="trend-title">🌙 Best Hunting Time</div>' +
    '<div class="trend-sub">Wildlife activity (harvests + animals sighted) by moon phase, all years</div>' +
    '<div style="display:flex;align-items:flex-end;gap:4px;padding:8px 0 4px">' + bars + '</div>' +
    '<div class="trend-stats" style="margin-top:12px">' +
      '<span class="trend-stat up">' + MOON_PHASES[best].icon + ' Best around the ' + MOON_PHASES[best].name +
        ' — ' + Math.round(counts[best] / total * 100) + '% of activity (' + counts[best] + ' of ' + total + ')</span>' +
      (nextStr ? '<span class="trend-stat">Next ' + MOON_PHASES[best].name + ': ' + nextStr + '</span>' : '') +
    '</div>';
}

// ── Spending ──
// Purchases carry pu-cost; every other entry type can carry an optional cost.
function entryCost(e) {
  return (parseFloat(e.cost) || 0) + (parseFloat(e['pu-cost']) || 0);
}

function spendBucket(e) {
  if (e.type === 'Purchase') return e['pu-category'] || 'Purchases';
  return e.type;
}

function fmtDollars(v) {
  return '$' + Math.round(v).toLocaleString();
}

function renderSpendCard() {
  var byYear = {};   // year -> total
  var thisYearBuckets = {};
  var thisYear = String(new Date().getFullYear());
  entries.forEach(function(e) {
    var c = entryCost(e);
    if (!c || !e.datetime) return;
    var y = e.datetime.slice(0, 4);
    byYear[y] = (byYear[y] || 0) + c;
    if (y === thisYear) {
      var b = spendBucket(e);
      thisYearBuckets[b] = (thisYearBuckets[b] || 0) + c;
    }
  });
  var years = Object.keys(byYear).sort();
  if (!years.length) return;

  var card = document.getElementById('spendCard');
  card.style.display = '';

  var shown = years.slice(-12);
  var max = Math.max.apply(null, shown.map(function(y) { return byYear[y]; })) || 1;
  var bars = shown.map(function(y) {
    var h = Math.max(4, Math.round(byYear[y] / max * 110));
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"' +
      ' title="' + y + ': ' + fmtDollars(byYear[y]) + '">' +
      '<span style="font-size:0.72rem;color:#777">' + fmtDollars(byYear[y]) + '</span>' +
      '<div style="width:70%;max-width:38px;height:' + h + 'px;border-radius:4px 4px 0 0;background:' +
        (y === thisYear ? '#176a55' : '#8fbfae') + '"></div>' +
      '<span style="font-size:0.7rem;color:#888">' + y.slice(2) + '</span>' +
    '</div>';
  }).join('');

  // This year's spending by bucket, largest first
  var buckets = Object.keys(thisYearBuckets).sort(function(a, b) {
    return thisYearBuckets[b] - thisYearBuckets[a];
  });
  var chips = buckets.map(function(b) {
    return '<span class="trend-stat">' + escHtml(b) + ': ' + fmtDollars(thisYearBuckets[b]) + '</span>';
  }).join('');

  card.innerHTML =
    '<div class="trend-title">💰 Investment in the Land</div>' +
    '<div class="trend-sub">Annual totals from Purchase costs and the optional Cost field on other entries — the paper trail behind your practices</div>' +
    '<div style="display:flex;align-items:flex-end;gap:4px;padding:8px 0 4px">' + bars + '</div>' +
    (chips ? '<div style="font-size:0.78rem;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:0.04em;margin-top:12px">' + thisYear + ' by category</div>' +
      '<div class="trend-stats" style="margin-top:6px">' + chips + '</div>' : '');
}

// ── Rainfall ──
// 'YYYY-MM' -> { inches, src }. The owner's rain-gauge entries always win
// over imported regional history for any month they logged.
function monthlyRainfall() {
  var out = {};
  if (rainHistory && rainHistory.monthly) {
    rainHistory.monthly.forEach(function(m) {
      out[m.year + '-' + String(m.month).padStart(2, '0')] = { inches: m.inches, src: 'history' };
    });
  }
  var gauge = {};
  entries.forEach(function(e) {
    if (e.type !== 'Rainfall' || !e.datetime) return;
    var v = parseFloat(e['rf-inches']);
    if (!isFinite(v) || v < 0) return;
    var k = e.datetime.slice(0, 7);
    gauge[k] = (gauge[k] || 0) + v;
  });
  Object.keys(gauge).forEach(function(k) {
    out[k] = { inches: Math.round(gauge[k] * 100) / 100, src: 'gauge' };
  });
  return out;
}

function yearlyRainfall(monthly) {
  var byYear = {};
  Object.keys(monthly).forEach(function(k) {
    var y = k.slice(0, 4);
    if (!byYear[y]) byYear[y] = { inches: 0, months: 0, gauge: false };
    byYear[y].inches += monthly[k].inches;
    byYear[y].months++;
    if (monthly[k].src === 'gauge') byYear[y].gauge = true;
  });
  return byYear;
}

function renderRainCard(byYear) {
  var years = Object.keys(byYear).sort();
  if (!years.length) return;
  var card = document.getElementById('rainCard');
  card.style.display = '';

  var shown = years.slice(-12);
  var max = Math.max.apply(null, shown.map(function(y) { return byYear[y].inches; })) || 1;
  var thisYear = String(new Date().getFullYear());

  var bars = shown.map(function(y) {
    var r = byYear[y];
    var h = Math.max(4, Math.round(r.inches / max * 110));
    var partial = r.months < 12;
    var color = y === thisYear ? '#1a5a8b' : '#7aaed4';
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"' +
      ' title="' + y + ': ' + (Math.round(r.inches * 10) / 10) + ' in over ' + r.months + ' month' + (r.months === 1 ? '' : 's') +
      (r.gauge ? ' (includes your gauge readings)' : ' (regional history)') + '">' +
      '<span style="font-size:0.72rem;color:#777">' + (Math.round(r.inches * 10) / 10) + '</span>' +
      '<div style="width:70%;max-width:38px;height:' + h + 'px;border-radius:4px 4px 0 0;background:' + color +
        (partial ? ';opacity:0.55' : '') + '"></div>' +
      '<span style="font-size:0.7rem;color:#888">' + y.slice(2) + (partial ? '*' : '') + '</span>' +
    '</div>';
  }).join('');

  var full = years.filter(function(y) { return byYear[y].months === 12; });
  var avg = full.length
    ? full.reduce(function(s, y) { return s + byYear[y].inches; }, 0) / full.length
    : null;

  var stats = [];
  if (byYear[thisYear]) {
    stats.push('<span class="trend-stat">' + thisYear + ' so far: ' + (Math.round(byYear[thisYear].inches * 10) / 10) + ' in</span>');
  }
  if (avg !== null) {
    stats.push('<span class="trend-stat">Average full year: ' + (Math.round(avg * 10) / 10) + ' in</span>');
    if (byYear[thisYear] && avg) {
      var pct = Math.round(byYear[thisYear].inches / avg * 100);
      stats.push('<span class="trend-stat ' + (pct >= 75 ? 'up' : 'down') + '">' + pct + '% of an average year</span>');
    }
  }

  card.innerHTML =
    '<div class="trend-title">🌧️ Rainfall</div>' +
    '<div class="trend-sub">Annual totals — your rain-gauge entries' +
      (rainHistory ? ', backfilled with regional history (' + escHtml(rainHistory.region || 'imported') + ')' : '') +
      ' · * partial year</div>' +
    '<div style="display:flex;align-items:flex-end;gap:4px;padding:8px 0 4px">' + bars + '</div>' +
    (stats.length ? '<div class="trend-stats" style="margin-top:10px">' + stats.join('') + '</div>' : '') +
    (!rainHistory ? '<div style="font-size:0.78rem;color:#888;margin-top:8px">Import regional history in <a href="/settings#rainfall" style="color:#1a4a1a">Settings → Rainfall</a> to see how your years compare to the long-term record.</div>' : '');
}

async function init() {
  try {
    entries = await (await fetch('/api/log')).json();
    routes = await (await fetch('/api/routes')).json();
  } catch (e) { /* leave empty */ }
  try {
    rainHistory = await (await fetch('/api/rainfall')).json();
  } catch (e) { rainHistory = null; }
  var rainYears = yearlyRainfall(monthlyRainfall());

  renderMoonCard();
  renderRainCard(rainYears);
  renderSpendCard();

  // Group census entries by route (saved route id, legacy text, or unrouted),
  // then split each route into a series per target species
  var groups = {};
  entries.forEach(function(e) {
    if (e.type !== 'Census') return;
    var count = parseCount(e['ce-total']);
    if (count === null || !e.datetime) return;
    var key, label;
    if (e['ce-routeId'] && routeNameById(e['ce-routeId'])) {
      key = 'r:' + e['ce-routeId'];
      label = routeNameById(e['ce-routeId']);
    } else if (e['ce-route']) {
      key = 't:' + e['ce-route'];
      label = e['ce-route'];
    } else {
      key = 'none';
      label = 'No route recorded';
    }
    if (!groups[key]) groups[key] = { label: label, series: {}, total: 0, types: {} };
    var species = e['ce-species'] || 'Unspecified';
    (groups[key].series[species] = groups[key].series[species] || []).push({
      x: dateFrac(e.datetime), date: e.datetime, count: count, id: e.id,
      surveyType: e['ce-surveyType'] || ''
    });
    groups[key].total++;
    if (e['ce-surveyType']) groups[key].types[e['ce-surveyType']] = true;
  });

  var keys = Object.keys(groups);
  var body = document.getElementById('trendsBody');
  if (!keys.length) {
    body.innerHTML = '<div class="trend-empty">No census entries with counts yet.<br>' +
      'Log a Census in the Activity Log with a number in "Total Observed" and it will chart here.</div>';
    return;
  }

  // Routes with the most surveys first
  keys.sort(function(a, b) { return groups[b].total - groups[a].total; });

  var COLORS = ['#1a4a1a', '#1a398b', '#8b1a1a', '#8b5a1a', '#5a1a8b', '#176a55'];

  body.innerHTML = keys.map(function(k) {
    var g = groups[k];
    var types = Object.keys(g.types).join(', ');
    var speciesNames = Object.keys(g.series).sort();
    var seriesArr = speciesNames.map(function(sp, i) {
      var pts = g.series[sp].sort(function(a, b) { return a.x - b.x; });
      return { name: sp, color: COLORS[i % COLORS.length], points: pts };
    });

    var chartable = seriesArr.some(function(s) { return s.points.length >= 2; });
    var chart = chartable
      ? renderChart(seriesArr, rainYears)
      : '<div style="color:#999;font-size:0.85rem;font-style:italic;padding:14px 0">Only one survey per species so far — a second one starts the trend line.</div>';

    var legend = (speciesNames.length > 1 || speciesNames[0] !== 'Unspecified')
      ? '<div class="trend-stats" style="margin:6px 0 4px">' + seriesArr.map(function(s) {
          return '<span class="trend-stat" style="background:none;border:1px solid #e0e0e0">' +
            '<span style="display:inline-block;width:10px;height:10px;border-radius:5px;background:' + s.color + ';margin-right:5px;vertical-align:middle"></span>' +
            escHtml(s.name) + '</span>';
        }).join('') + '</div>'
      : '';

    // Year averages and trend direction, per species
    var stats = [];
    seriesArr.forEach(function(s) {
      var byYear = {};
      s.points.forEach(function(p) {
        var y = p.date.slice(0, 4);
        (byYear[y] = byYear[y] || []).push(p.count);
      });
      var years = Object.keys(byYear).sort();
      var prefix = (seriesArr.length > 1) ? escHtml(s.name) + ' ' : '';
      years.forEach(function(y) {
        var arr = byYear[y];
        var avg = arr.reduce(function(sum, v) { return sum + v; }, 0) / arr.length;
        stats.push('<span class="trend-stat">' + prefix + y + ': avg ' + (Math.round(avg * 10) / 10) + ' (' + arr.length + ' survey' + (arr.length === 1 ? '' : 's') + ')</span>');
      });
      if (years.length >= 2) {
        var firstAvg = byYear[years[0]].reduce(function(sum, v) { return sum + v; }, 0) / byYear[years[0]].length;
        var lastAvg = byYear[years[years.length - 1]].reduce(function(sum, v) { return sum + v; }, 0) / byYear[years[years.length - 1]].length;
        var pct = firstAvg ? Math.round((lastAvg - firstAvg) / firstAvg * 100) : 0;
        stats.push('<span class="trend-stat ' + (pct >= 0 ? 'up' : 'down') + '">' +
          prefix + (pct >= 0 ? '▲' : '▼') + ' ' + Math.abs(pct) + '% since ' + years[0] + '</span>');
      }
    });

    return '<div class="trend-card">' +
      '<div class="trend-title">' + escHtml(g.label) + '</div>' +
      '<div class="trend-sub">' + g.total + ' surveys' + (types ? ' · ' + escHtml(types) : '') + '</div>' +
      legend +
      chart +
      '<div class="trend-stats">' + stats.join('') + '</div>' +
    '</div>';
  }).join('');
}

function renderChart(seriesArr, rainYears) {
  var W = 640, H = 220, padL = 42, padR = 16, padT = 14, padB = 28;
  var allPoints = [];
  seriesArr.forEach(function(s) { allPoints = allPoints.concat(s.points); });
  var xs = allPoints.map(function(p) { return p.x; });
  var minX = Math.floor(Math.min.apply(null, xs));
  var maxX = Math.ceil(Math.max.apply(null, xs) + 0.001);
  if (maxX - minX < 1) maxX = minX + 1;
  var maxY = Math.max.apply(null, allPoints.map(function(p) { return p.count; })) * 1.15 || 10;

  function X(v) { return padL + (v - minX) / (maxX - minX) * (W - padL - padR); }
  function Y(v) { return H - padB - (v / maxY) * (H - padT - padB); }

  var svg = '<svg class="trend-chart" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';

  // Annual rainfall, drawn first as soft bars behind the census lines so wet
  // and dry years are visible context for the counts (own scale, not the
  // left axis)
  if (rainYears) {
    var rys = [];
    for (var ry = minX; ry < maxX; ry++) if (rainYears[ry]) rys.push(ry);
    if (rys.length) {
      var rainMax = (Math.max.apply(null, rys.map(function(y) { return rainYears[y].inches; })) || 1) * 1.25;
      rys.forEach(function(y) {
        var barTop = H - padB - (rainYears[y].inches / rainMax) * (H - padT - padB);
        svg += '<rect x="' + X(y + 0.08) + '" y="' + barTop + '" width="' + (X(y + 0.92) - X(y + 0.08)) +
          '" height="' + (H - padB - barTop) + '" rx="3" fill="#cfe3f5" opacity="0.6">' +
          '<title>' + y + ' rainfall: ' + (Math.round(rainYears[y].inches * 10) / 10) + ' in' +
          (rainYears[y].months < 12 ? ' (partial year)' : '') + '</title></rect>';
      });
      svg += '<text x="' + (W - padR) + '" y="' + (padT - 2) + '" text-anchor="end" font-size="9" fill="#7aaed4">blue bars: annual rainfall</text>';
    }
  }

  // Horizontal gridlines + y labels
  var ySteps = 4;
  for (var i = 0; i <= ySteps; i++) {
    var v = Math.round(maxY / ySteps * i);
    svg += '<line x1="' + padL + '" y1="' + Y(v) + '" x2="' + (W - padR) + '" y2="' + Y(v) + '" stroke="#eee" stroke-width="1"/>';
    svg += '<text x="' + (padL - 6) + '" y="' + (Y(v) + 4) + '" text-anchor="end" font-size="10" fill="#999">' + v + '</text>';
  }
  // Year ticks
  for (var y = minX; y <= maxX; y++) {
    svg += '<line x1="' + X(y) + '" y1="' + padT + '" x2="' + X(y) + '" y2="' + (H - padB) + '" stroke="#f4f4f4" stroke-width="1"/>';
    svg += '<text x="' + X(y) + '" y="' + (H - padB + 16) + '" text-anchor="middle" font-size="10" fill="#888">' + y + '</text>';
  }
  // One line + point set per species
  seriesArr.forEach(function(s) {
    if (s.points.length >= 2) {
      var poly = s.points.map(function(p) { return X(p.x) + ',' + Y(p.count); }).join(' ');
      svg += '<polyline points="' + poly + '" fill="none" stroke="' + s.color + '" stroke-width="2.5" stroke-linejoin="round"/>';
    }
    s.points.forEach(function(p) {
      var icon = CENSUS_ICONS[p.surveyType];
      var title = '<title>' + s.name + (p.surveyType ? ' · ' + p.surveyType : '') + ' — ' + p.date.slice(0, 10) + ': ' + p.count + '</title>';
      if (icon) {
        // Survey-type icon in a series-colored ring
        svg += '<a href="/activity#entry-' + p.id + '">' +
          '<circle cx="' + X(p.x) + '" cy="' + Y(p.count) + '" r="9" fill="white" stroke="' + s.color + '" stroke-width="2"/>' +
          '<text x="' + X(p.x) + '" y="' + (Y(p.count) + 3.5) + '" text-anchor="middle" font-size="10">' + icon + title + '</text>' +
        '</a>';
      } else {
        svg += '<a href="/activity#entry-' + p.id + '"><circle cx="' + X(p.x) + '" cy="' + Y(p.count) + '" r="4.5" fill="white" stroke="' + s.color + '" stroke-width="2">' +
          title + '</circle></a>';
      }
    });
  });
  return svg + '</svg>';
}

init();
</script>
<script src="/help.js"></script>
