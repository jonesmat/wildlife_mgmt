<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Map</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="/theme.js"></script>
<script src="/store.js"></script>
<link rel="stylesheet" href="/form-shared.css">
<style>
.map-controls {
  display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
  background: white; border: 1px solid #ddd; border-radius: 8px;
  padding: 12px 16px; margin-bottom: 14px; font-size: 0.88rem;
}
.map-controls label { font-weight: 600; color: #333; }
.map-controls select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
.map-controls input[type="range"] { width: 180px; vertical-align: middle; }
.year-label { font-weight: 700; color: #1a4a1a; min-width: 44px; display: inline-block; }

.map-wrap {
  position: relative; border: 2px solid #1a4a1a; border-radius: 10px;
  overflow: hidden; background: #f5f8f5;
}
.map-wrap img { width: 100%; display: block; }
.map-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

.map-pin {
  position: absolute; transform: translate(-50%, -50%); width: 28px; height: 28px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; background: white; border: 2.5px solid #888; cursor: pointer;
  box-shadow: 0 1px 5px rgba(0,0,0,0.35); transition: transform 0.12s;
}
.map-pin:hover { transform: translate(-50%, -50%) scale(1.25); z-index: 5; }
.map-pin.selected { transform: translate(-50%, -50%) scale(1.3); z-index: 6; box-shadow: 0 0 0 3px rgba(255,215,0,0.8); }
.pin-General     { border-color: #1a4a1a; background: #e8f0e8; }
.pin-Harvest     { border-color: #8b1a1a; background: #fde8e8; }
.pin-Sighting    { border-color: #1a398b; background: #e8f0fd; }
.pin-Activity    { border-color: #8b5a1a; background: #fdf5e8; }
.pin-Census      { border-color: #5a1a8b; background: #f0e8fd; }
.pin-Predator    { border-color: #8b1a6a; background: #fde8f5; }
.pin-Maintenance { border-color: #1a3a8b; background: #e8eefd; }
.pin-Purchase    { border-color: #176a55; background: #e4f3ef; }
.asset-pin       { border-color: #b58a2a; background: #fdf5e8; border-style: dashed; }

.map-detail {
  display: none; background: white; border: 1px solid #ddd; border-radius: 8px;
  padding: 14px 16px; margin-top: 12px;
}
.map-detail.open { display: block; }
.md-title { font-weight: 700; color: #1a4a1a; font-size: 0.98rem; }
.md-meta { font-size: 0.8rem; color: #777; margin-top: 2px; }
.md-photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.md-photos img { width: 90px; height: 90px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
.map-empty { color: #999; font-style: italic; text-align: center; padding: 50px 20px; }
</style>
<script src="/google-sync.js"></script>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<header>
  <h1>🗺️ Property Map</h1>
  <div class="header-actions">
    <a href="/activity" class="btn btn-white">Activity Log</a>
    <a href="/" class="btn btn-white">Home</a>
  </div>
</header>

<div class="layout">
  <main class="main" style="max-width:980px">
    <div class="map-controls">
      <span id="imageSelectWrap" style="display:none">
        <label>Map:</label>
        <select id="imageSelect" onchange="imageChanged()"></select>
      </span>
      <span>
        <label>Years:</label>
        <select id="yearFrom" onchange="yearRangeChanged('from')"></select>
        <label style="font-weight:400">to</label>
        <select id="yearTo" onchange="yearRangeChanged('to')"></select>
      </span>
      <span>
        <label><input type="checkbox" id="allYears" checked onchange="render()"> All months</label>
      </span>
      <span id="sliderWrap" style="opacity:0.4">
        <input type="range" id="yearSlider" style="width:240px" oninput="sliderMoved()" disabled>
        <span class="year-label" id="yearLabel" style="min-width:74px">—</span>
      </span>
      <span>
        <label><input type="checkbox" id="showRoutes" checked onchange="render()"> Show routes</label>
      </span>
      <span>
        <label><input type="checkbox" id="showAssets" checked onchange="render()"> Show assets</label>
      </span>
      <span id="pinCount" style="color:#777;margin-left:auto"></span>
    </div>

    <div class="map-wrap" id="mapWrap" style="display:none">
      <img id="mapImg" alt="Property map">
      <svg class="map-svg" id="routeSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div id="pinLayer"></div>
    </div>
    <div class="map-empty" id="mapEmpty" style="display:none"></div>

    <div class="map-detail" id="mapDetail"></div>
  </main>
</div>

<script>
var propImages = [], currentPropId = null, routes = [], entries = [], assets = [];
var selectedImageId = null, selectedEntryId = null, selectedAssetId = null;

// Same category icons as the Asset Registry page
var ASSET_ICONS = {
  'Feeder': '🌽', 'Water Trough / Guzzler': '💧', 'Blind / Stand': '🪜',
  'Game Camera': '📷', 'Nest Box': '🐦', 'Well / Windmill': '🌀',
  'Pond / Tank': '🏞️', 'Gate / Fence': '🚧', 'Other Structure': '🏠',
  'UTV / ATV': '🛻', 'Tractor': '🚜', 'Shredder / Mower': '🌾', 'Plow / Disk': '⚙️',
  'Sprayer': '🧴', 'Trailer': '🚚', 'Chainsaw': '🪚', 'Generator / Pump': '🔌',
  'Other Equipment': '🔧'
};

var TYPE_ICONS = {
  'General': '📝', 'Harvest': '🎯', 'Sighting': '👀',
  'Habitat Control': '🌳', 'Erosion Control': '🏞️', 'Predator Control': '🪤',
  'Supplemental Water': '💧', 'Supplemental Food': '🌽', 'Supplemental Shelter': '🏠',
  'Census': '📊', 'Maintenance': '🔧', 'Purchase': '🛒',
  'Activity': '🚜' // legacy
};

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// For HTML attribute values (title=, etc.): also escapes quotes
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function fmtDate(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (e) { return s; }
}

function entryTitle(e) {
  if (e.type === 'General') return e['f-name'] || e.name || 'General Entry';
  if (e.type === 'Harvest') return (e['hv-species'] || 'Harvest') + (e['hv-sex'] ? ' — ' + e['hv-sex'] : '');
  if (e.type === 'Sighting') return (e['si-count'] ? e['si-count'] + ' ' : '') + (e['si-species'] || 'Sighting');
  if (window.PRACTICE_FIELDS[e.type]) return window.practiceTitle(e);
  if (e.type === 'Activity') return e['ac-name'] || e['ac-category'] || e.type; // legacy
  if (e.type === 'Census') return (e['ce-surveyType'] || 'Census') + (e['ce-species'] ? ' — ' + e['ce-species'] : '');
  if (e.type === 'Predator Control') return (e['pc-species'] || 'Predator Control');
  if (e.type === 'Maintenance') return e['ma-item'] || 'Maintenance';
  if (e.type === 'Purchase') return e['pu-item'] || 'Purchase';
  return e.type;
}

async function init() {
  try {
    var pi = await (await fetch('/api/property-images')).json();
    propImages = pi.images || [];
    currentPropId = pi.currentId;
    routes = await (await fetch('/api/routes')).json();
    entries = await (await fetch('/api/log')).json();
    assets = await (await fetch('/api/assets')).json();
  } catch (e) { /* leave empty */ }

  if (!propImages.length) {
    document.getElementById('mapEmpty').style.display = '';
    document.getElementById('mapEmpty').textContent = 'No property image yet. Upload one in Settings → Property to start mapping your activities.';
    return;
  }

  // Image selector (only when more than one image exists)
  selectedImageId = currentPropId || propImages[propImages.length - 1].id;
  if (propImages.length > 1) {
    var sel = document.getElementById('imageSelect');
    propImages.slice().reverse().forEach(function(img) {
      var opt = document.createElement('option');
      opt.value = img.id;
      opt.textContent = (img.id === currentPropId ? 'Current — ' : '') + 'Uploaded ' + fmtDate(img.uploadedAt);
      sel.appendChild(opt);
    });
    sel.value = selectedImageId;
    document.getElementById('imageSelectWrap').style.display = '';
  }

  populateYearSelects();
  setupSlider();
  render();
}

function locatedEntries() {
  return entries.filter(function(e) {
    return e.loc && e.loc.img === selectedImageId;
  });
}

// The slider steps month by month; values are month indexes (year*12 + month-1)
function monthIdxLabel(idx) {
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[idx % 12] + ' ' + Math.floor(idx / 12);
}

function monthIdxToYM(idx) {
  return Math.floor(idx / 12) + '-' + String((idx % 12) + 1).padStart(2, '0');
}

function yearRange() {
  return {
    from: +document.getElementById('yearFrom').value,
    to: +document.getElementById('yearTo').value
  };
}

// Year options: every year with a located entry on this image, plus the
// current year. Defaults to current year → current year.
function populateYearSelects() {
  var current = new Date().getFullYear();
  var years = {};
  years[current] = true;
  locatedEntries().forEach(function(e) {
    var y = parseInt((e.datetime || '').slice(0, 4), 10);
    if (y > 1900) years[y] = true;
  });
  var list = Object.keys(years).map(Number).sort(function(a, b) { return a - b; });
  ['yearFrom', 'yearTo'].forEach(function(id) {
    var sel = document.getElementById(id);
    var prev = sel.value;
    sel.innerHTML = '';
    list.forEach(function(y) {
      var opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      sel.appendChild(opt);
    });
    sel.value = (prev && list.indexOf(+prev) !== -1) ? prev : current;
  });
}

function yearRangeChanged(which) {
  // Keep from <= to by dragging the other end along
  var r = yearRange();
  if (r.from > r.to) {
    if (which === 'from') document.getElementById('yearTo').value = r.from;
    else document.getElementById('yearFrom').value = r.to;
  }
  setupSlider();
  render();
}

function setupSlider() {
  // Slider scrubs the months inside the selected year range
  var r = yearRange();
  var slider = document.getElementById('yearSlider');
  var prev = +slider.value;
  slider.min = r.from * 12;
  slider.max = r.to * 12 + 11;
  var now = new Date();
  var nowIdx = now.getFullYear() * 12 + now.getMonth();
  var def = Math.min(Math.max(nowIdx, +slider.min), +slider.max);
  slider.value = (prev >= +slider.min && prev <= +slider.max) ? prev : def;
  document.getElementById('yearLabel').textContent = monthIdxLabel(+slider.value);
}

function imageChanged() {
  selectedImageId = document.getElementById('imageSelect').value;
  selectedEntryId = null;
  document.getElementById('mapDetail').classList.remove('open');
  populateYearSelects();
  setupSlider();
  render();
}

function sliderMoved() {
  document.getElementById('yearLabel').textContent = monthIdxLabel(+document.getElementById('yearSlider').value);
  render();
}

function render() {
  var allYears = document.getElementById('allYears').checked;
  var slider = document.getElementById('yearSlider');
  slider.disabled = allYears;
  document.getElementById('sliderWrap').style.opacity = allYears ? '0.4' : '1';

  var img = null;
  for (var i = 0; i < propImages.length; i++) {
    if (propImages[i].id === selectedImageId) img = propImages[i];
  }
  if (!img) return;
  document.getElementById('mapWrap').style.display = '';
  document.getElementById('mapImg').src = '/property-images/' + img.filename;

  // Routes drawn on this image
  var routeSvg = document.getElementById('routeSvg');
  if (document.getElementById('showRoutes').checked) {
    routeSvg.innerHTML = routes.filter(function(r) {
      return r.imageId === selectedImageId && r.points && r.points.length;
    }).map(function(r) {
      var pts = r.points.map(function(p) { return (p.x * 100) + ',' + (p.y * 100); }).join(' ');
      return '<polyline points="' + pts + '" fill="none" stroke="#e01818" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" opacity="0.75"/>';
    }).join('');
  } else {
    routeSvg.innerHTML = '';
  }

  // Pins, filtered to the year range, then the selected month when scrubbing
  var r = yearRange();
  var ym = monthIdxToYM(+slider.value);
  var shown = locatedEntries().filter(function(e) {
    var y = parseInt((e.datetime || '').slice(0, 4), 10);
    if (!(y >= r.from && y <= r.to)) return false;
    return allYears || (e.datetime || '').slice(0, 7) === ym;
  });
  var pinHtml = shown.map(function(e) {
    var sel = (e.id === selectedEntryId) ? ' selected' : '';
    return '<div class="map-pin pin-' + e.type.split(' ')[0] + sel + '"' +
      ' style="left:' + (e.loc.x * 100) + '%;top:' + (e.loc.y * 100) + '%"' +
      ' title="' + escAttr(entryTitle(e)) + ' — ' + fmtDate(e.datetime) + '"' +
      ' onclick="selectPin(\'' + sanFn(e.id) + '\')">' +
      (TYPE_ICONS[e.type] || '📌') +
    '</div>';
  }).join('');

  // Asset pins: fixed infrastructure isn't tied to a year, so it ignores the
  // time filters entirely
  if (document.getElementById('showAssets').checked) {
    pinHtml += assets.filter(function(a) {
      return a.loc && a.loc.img === selectedImageId && a.status !== 'Retired';
    }).map(function(a) {
      var sel = (a.id === selectedAssetId) ? ' selected' : '';
      return '<div class="map-pin asset-pin' + sel + '"' +
        ' style="left:' + (a.loc.x * 100) + '%;top:' + (a.loc.y * 100) + '%"' +
        ' title="' + escAttr(a.name) + ' (' + escAttr(a.category) + ')"' +
        ' onclick="selectAssetPin(\'' + sanFn(a.id) + '\')">' +
        (ASSET_ICONS[a.category] || '🔧') +
      '</div>';
    }).join('');
  }
  document.getElementById('pinLayer').innerHTML = pinHtml;

  var rangeLabel = (r.from === r.to) ? String(r.from) : r.from + '–' + r.to;
  document.getElementById('pinCount').textContent =
    shown.length + ' located ' + (shown.length === 1 ? 'entry' : 'entries') +
    ' in ' + (allYears ? rangeLabel : monthIdxLabel(+slider.value));
}

function selectAssetPin(id) {
  selectedAssetId = (selectedAssetId === id) ? null : id;
  selectedEntryId = null;
  render();
  var panel = document.getElementById('mapDetail');
  if (!selectedAssetId) { panel.classList.remove('open'); return; }
  var a = null;
  for (var i = 0; i < assets.length; i++) if (assets[i].id === id) a = assets[i];
  if (!a) return;
  // Most recent linked maintenance entry, if any
  var last = null;
  entries.forEach(function(e) {
    if (e['ma-assetId'] === a.id && (!last || (e.datetime || '') > (last.datetime || ''))) last = e;
  });
  panel.innerHTML =
    '<div class="md-title">' + (ASSET_ICONS[a.category] || '🔧') + ' ' + escHtml(a.name) + '</div>' +
    '<div class="md-meta">' + escHtml(a.category) +
      (a.location ? ' · ' + escHtml(a.location) : '') +
      (last ? ' · last service ' + fmtDate(last.datetime) : ' · no service logged') + '</div>' +
    (a.notes ? '<div style="font-size:0.85rem;color:#555;margin-top:6px;font-style:italic">' + escHtml(a.notes) + '</div>' : '') +
    '<div style="margin-top:10px"><a class="btn btn-secondary" style="font-size:0.8rem;padding:6px 14px;text-decoration:none" href="/assets#asset-' + sanFn(a.id) + '">Open in Asset Registry</a></div>';
  panel.classList.add('open');
}

function selectPin(id) {
  selectedEntryId = (selectedEntryId === id) ? null : id;
  selectedAssetId = null;
  render();
  var panel = document.getElementById('mapDetail');
  if (!selectedEntryId) { panel.classList.remove('open'); return; }
  var e = null;
  for (var i = 0; i < entries.length; i++) if (entries[i].id === id) e = entries[i];
  if (!e) return;
  var photos = (e.photos || []).map(function(f) {
    f = sanFn(f);
    return '<a href="/photos/' + f + '" target="_blank" rel="noopener">' +
      '<img src="/photos/thumb-' + f + '" onerror="this.onerror=null;this.src=\'/photos/' + f + '\'" alt=""></a>';
  }).join('');
  panel.innerHTML =
    '<div class="md-title">' + (TYPE_ICONS[e.type] || '') + ' ' + escHtml(entryTitle(e)) + '</div>' +
    '<div class="md-meta">' + escHtml(e.type) + ' · ' + fmtDate(e.datetime) + '</div>' +
    (photos ? '<div class="md-photos">' + photos + '</div>' : '') +
    '<div style="margin-top:10px"><a class="btn btn-secondary" style="font-size:0.8rem;padding:6px 14px;text-decoration:none" href="/activity#entry-' + e.id + '">Open in Activity Log</a></div>';
  panel.classList.add('open');
}

init();
</script>
<script src="/help.js"></script>
</body>
</html>
